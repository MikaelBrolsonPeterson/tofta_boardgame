<text x="271.5" y="9.5" font-size="4" fill="white" text-anchor="middle" font-family="Arial">14</text>
<rect x="277" y="3" width="9" height="10" fill="#4a5568" stroke="#718096" stroke-width="0.3" rx="0.5"/>
