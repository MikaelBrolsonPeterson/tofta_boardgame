<text x="229.5" y="9.5" font-size="4" fill="white" text-anchor="middle" font-family="Arial">10</text>
<text x="216" y="14.5" font-size="3" fill="#68d391" text-anchor="middle" font-family="Arial">ERA II</text>

<!-- Rounds 11-15 (Era III) -->
