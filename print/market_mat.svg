<rect x="1.5" y="9" width="294" height="7.5" fill="#2d3748"/>
<text x="6" y="11.5" font-size="7" font-weight="bold" fill="white" font-family="Arial">TOFTA</text>
<text x="27" y="11" font-size="5" fill="#a0aec0" font-family="Arial">MARKET MAT</text>

<!-- Round tracker -->
